<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 新增：用于存放最新版本的时间戳（Unix Time），更新时修改此值 -->
<meta name="module-version-time" content="1700000000">
<title>亡客控制面板 v19.0</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* 保持原有的CSS样式不变 */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
--primary: #667eea; --primary-dark: #764ba2;
--secondary: #f093fb; --secondary-dark: #f5576c;
--success: #4ade80; --danger: #f87171;
--warning: #fbbf24; --dark: #1f2937;
--light: #f9fafb; --gray-100: #f3f4f6;
--gray-200: #e5e7eb; --gray-300: #d1d5db;
--gray-600: #4b5563; --gray-800: #1f2937;
--shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
--shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
--radius: 12px; --transition: all 0.3s ease;
}
body {
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
min-height: 100vh; padding: 20px; color: var(--gray-800);
}
.container {
max-width: 800px; margin: 0 auto; background: white;
border-radius: var(--radius); box-shadow: var(--shadow-lg);
overflow: hidden; animation: fadeIn 0.6s ease-out;
}
@keyframes fadeIn {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}
.header {
background: linear-gradient(90deg, var(--primary), var(--primary-dark));
color: white; padding: 25px 30px; position: relative; overflow: hidden;
}
.header::before {
content: ''; position: absolute; top: -50%; right: -20%;
width: 300px; height: 300px; background: rgba(255,255,255,0.1);
border-radius: 50%;
}
.header h1 {
font-size: 28px; font-weight: 700; margin-bottom: 8px;
display: flex; align-items: center; gap: 12px;
}
.header h1 i {
background: rgba(255,255,255,0.2); width: 48px; height: 48px;
border-radius: 50%; display: flex; align-items: center;
justify-content: center;
}
.header .subtitle { font-size: 16px; opacity: 0.9; margin-bottom: 5px; }
.version-badge {
display: inline-block; background: rgba(255,255,255,0.2);
padding: 4px 12px; border-radius: 20px; font-size: 14px;
font-weight: 600; margin-top: 5px;
}
/* 新增：版本状态指示器样式 */
#versionStatus {
display: inline-block;
padding: 4px 12px;
border-radius: 20px;
font-size: 14px;
font-weight: 600;
margin-left: 10px;
}
.status-on { background: rgba(34, 197, 94, 0.2); color: #16a34a; }
.status-off { background: rgba(248, 113, 113, 0.2); color: #dc2626; }

.content { padding: 30px; }
.section {
background: var(--gray-100); border-radius: var(--radius);
padding: 25px; margin-bottom: 25px; border: 1px solid var(--gray-200);
}
.section-title {
font-size: 18px; font-weight: 600; margin-bottom: 20px;
color: var(--dark); display: flex; align-items: center; gap: 10px;
}
.section-title i { color: var(--primary); }
.controls-grid {
display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
gap: 20px;
}
.control-card {
background: white; border-radius: 10px; padding: 20px;
box-shadow: var(--shadow); transition: var(--transition);
border: 2px solid transparent;
}
.control-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.control-card.active { border-color: var(--primary); }
.control-header {
display: flex; justify-content: space-between;
align-items: center; margin-bottom: 15px;
}
.control-label { font-weight: 600; font-size: 16px; color: var(--gray-800); }

/* 开关样式 */
.switch { position: relative; display: inline-block; width: 60px; height: 30px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
background-color: var(--gray-300); transition: var(--transition);
border-radius: 34px;
}
.slider:before {
position: absolute; content: ""; height: 22px; width: 22px;
left: 4px; bottom: 4px; background-color: white;
transition: var(--transition); border-radius: 50%;
}
input:checked + .slider { background: linear-gradient(90deg, var(--success), #22c55e); }
input:checked + .slider:before { transform: translateX(30px); }

/* 滑块样式 */
.slider-container { margin-top: 15px; }
.slider-value {
display: flex; justify-content: space-between;
margin-bottom: 8px;
}
.slider-value .value {
font-weight: 700; color: var(--primary);
font-size: 18px;
}
.range-slider {
width: 100%; height: 8px; -webkit-appearance: none;
appearance: none; background: var(--gray-200);
border-radius: 4px; outline: none;
}
.range-slider::-webkit-slider-thumb {
-webkit-appearance: none; width: 24px; height: 24px;
border-radius: 50%; background: var(--primary);
cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
border: 3px solid white;
}
.range-slider::-moz-range-thumb {
width: 24px; height: 24px; border-radius: 50%;
background: var(--primary); cursor: pointer;
border: 3px solid white;
}

/* 范围设置样式 - 修改 */
.input-grid {
display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
gap: 15px; margin-top: 10px;
}
.input-group { position: relative; }
.input-group label {
display: block; font-size: 14px; font-weight: 500;
margin-bottom: 8px; color: var(--gray-600);
display: flex; justify-content: space-between; align-items: center;
}
.range-switch {
position: relative; display: inline-block; width: 46px; height: 24px;
}
.range-switch input { opacity: 0; width: 0; height: 0; }
.range-switch .slider {
position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
background-color: var(--gray-300); transition: var(--transition);
border-radius: 24px;
}
.range-switch .slider:before {
position: absolute; content: ""; height: 18px; width: 18px;
left: 3px; bottom: 3px; background-color: white;
transition: var(--transition); border-radius: 50%;
}
.range-switch input:checked + .slider { background: linear-gradient(90deg, var(--success), #22c55e); }
.range-switch input:checked + .slider:before { transform: translateX(22px); }
.input-with-icon { position: relative; }
.input-with-icon i {
position: absolute; left: 12px; top: 50%;
transform: translateY(-50%); color: var(--gray-400);
}
.input-with-icon input {
width: 100%; padding: 12px 12px 12px 40px;
border: 2px solid var(--gray-200); border-radius: 8px;
font-size: 15px; transition: var(--transition);
}
.input-with-icon input:disabled {
background-color: var(--gray-100);
color: var(--gray-400);
cursor: not-allowed;
}
.input-with-icon input:focus {
outline: none; border-color: var(--primary);
box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

/* 按钮样式 */
.action-buttons {
display: flex; gap: 15px; margin-top: 30px;
}
.btn {
flex: 1; padding: 16px 24px; border: none; border-radius: 10px;
font-size: 16px; font-weight: 600; cursor: pointer;
transition: var(--transition); display: flex;
align-items: center; justify-content: center; gap: 10px;
}
.btn-primary {
background: linear-gradient(90deg, var(--primary), var(--primary-dark));
color: white;
}
.btn-primary:hover {
transform: translateY(-2px);
box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
}
.btn-secondary {
background: var(--gray-200); color: var(--gray-800);
}
.btn-secondary:hover { background: var(--gray-300); transform: translateY(-2px); }

/* 状态提示 */
.status-indicator {
display: inline-flex; align-items: center; gap: 6px;
padding: 4px 10px; border-radius: 20px; font-size: 12px;
font-weight: 500; margin-left: 10px;
}
.status-on { background: rgba(34, 197, 94, 0.1); color: #16a34a; }
.status-off { background: rgba(248, 113, 113, 0.1); color: #dc2626; }

/* 加载动画 */
.loading {
display: inline-block; width: 20px; height: 20px;
border: 3px solid rgba(255,255,255,0.3);
border-radius: 50%; border-top-color: white;
animation: spin 1s ease-in-out infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 响应式 */
@media (max-width: 768px) {
.controls-grid { grid-template-columns: 1fr; }
.input-grid { grid-template-columns: 1fr; }
.action-buttons { flex-direction: column; }
}
</style>
</head>
<body>
<div class="container">
<!-- 头部区域 -->
<div class="header">
<h1><i class="fas fa-gamepad"></i>亡客控制面板</h1>
<p class="subtitle">公告：亡客公益频道 @wangkela</p>
<div style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
<span class="version-badge">版本 19.0</span>
<!-- 新增：版本状态显示 -->
<div id="versionStatus">检测中...</div>
</div>
<div id="lastUpdateTime" style="font-size: 13px; color: rgba(255,255,255,0.85); margin-left: 10px;"></div>
</div>

<!-- 内容区域 -->
<div class="content">
<!-- 核心功能区域 -->
<div class="section">
<h2 class="section-title"><i class="fas fa-sliders-h"></i>核心功能控制</h2>
<div class="controls-grid">
<!-- 全枪无后 -->
<div class="control-card" id="noRecoilCard">
<div class="control-header">
<span class="control-label">全枪无后</span>
<label class="switch">
<input type="checkbox" id="noRecoilSwitch" data-func="no_recoil">
<span class="slider"></span>
</label>
</div>
<p class="control-desc">开启后将禁用所有武器的后坐力效果</p>
<div class="status-indicator status-off" id="noRecoilStatus">已关闭</div>
</div>

<!-- 有准心聚点 -->
<div class="control-card" id="aimAssistCard">
<div class="control-header">
<span class="control-label">有准心聚点</span>
<label class="switch">
<input type="checkbox" id="aimAssistSwitch" data-func="aim_assist">
<span class="slider"></span>
</label>
</div>
<p class="control-desc">开启准心辅助瞄准功能</p>
<div class="status-indicator status-off" id="aimAssistStatus">已关闭</div>
</div>

<!-- 无准心聚点 -->
<div class="control-card" id="noAimAssistCard">
<div class="control-header">
<span class="control-label">无准心聚点</span>
<label class="switch">
<input type="checkbox" id="noAimAssistSwitch" data-func="no_aim_assist">
<span class="slider"></span>
</label>
</div>
<p class="control-desc">开启无准心自动瞄准功能</p>
<div class="status-indicator status-off" id="noAimAssistStatus">已关闭</div>
</div>

<!-- 全身范围 -->
<div class="control-card" id="fullBodyCard">
<div class="control-header">
<span class="control-label">全身范围</span>
<label class="switch">
<input type="checkbox" id="fullBodySwitch" data-func="full_body">
<span class="slider"></span>
</label>
</div>
<p class="control-desc">启用全身范围攻击效果</p>
<div class="status-indicator status-off" id="fullBodyStatus">已关闭</div>
</div>
</div>
</div>

<!-- 身位选择 -->
<div class="section">
<h2 class="section-title"><i class="fas fa-arrows-alt-h"></i>身位距离设置</h2>
<div class="control-card">
<div class="control-header">
<span class="control-label">身位选择</span>
<div class="slider-value">
<span class="value" id="distanceValue">1.0</span>
</div>
</div>
<input type="range" class="range-slider" id="distanceSlider" 
min="0.5" max="2.5" step="0.5" value="1.0">
<div class="slider-marks">
<div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: var(--gray-600);">
<span>0.5</span><span>1.0</span><span>1.5</span><span>2.0</span><span>2.5</span>
</div>
</div>
</div>
</div>

<!-- 范围设置 -->
<div class="section">
<h2 class="section-title"><i class="fas fa-crosshairs"></i>精准范围设置</h2>
<div class="input-grid">
<!-- 头部范围 -->
<div class="input-group">
<label>
<span>头部范围</span>
<label class="range-switch">
<input type="checkbox" id="headSwitch" class="range-switch-input">
<span class="slider"></span>
</label>
</label>
<div class="input-with-icon">
<i class="fas fa-head-side-virus"></i>
<input type="number" id="headRange" placeholder="0-100" min="0" max="100" disabled>
</div>
</div>

<!-- 胸部范围 -->
<div class="input-group">
<label>
<span>胸部范围</span>
<label class="range-switch">
<input type="checkbox" id="chestSwitch" class="range-switch-input">
<span class="slider"></span>
</label>
</label>
<div class="input-with-icon">
<i class="fas fa-heart"></i>
<input type="number" id="chestRange" placeholder="0-100" min="0" max="100" disabled>
</div>
</div>

<!-- 腹部范围 -->
<div class="input-group">
<label>
<span>腹部范围</span>
<label class="range-switch">
<input type="checkbox" id="abdomenSwitch" class="range-switch-input">
<span class="slider"></span>
</label>
</label>
<div class="input-with-icon">
<i class="fas fa-drumstick-bite"></i>
<input type="number" id="abdomenRange" placeholder="0-100" min="0" max="100" disabled>
</div>
</div>

<!-- 腿部范围 -->
<div class="input-group">
<label>
<span>腿部范围</span>
<label class="range-switch">
<input type="checkbox" id="legSwitch" class="range-switch-input">
<span class="slider"></span>
</label>
</label>
<div class="input-with-icon">
<i class="fas fa-walking"></i>
<input type="number" id="legRange" placeholder="0-100" min="0" max="100" disabled>
</div>
</div>
</div>
</div>

<!-- 操作按钮 -->
<div class="action-buttons">
<button class="btn btn-primary" id="saveBtn">
<i class="fas fa-save"></i>保存配置
</button>
<button class="btn btn-secondary" id="resetBtn">
<i class="fas fa-redo"></i>重置配置
</button>
<button class="btn" id="reloadBtn" style="background: var(--warning); color: white;">
<i class="fas fa-sync-alt"></i>重新加载
</button>
<!-- 模块控制按钮 -->
<div class="action-buttons" style="margin-top: 15px;">
<button class="btn" id="updateModuleBtn" style="background: linear-gradient(90deg, #06b6d4, #0891b2); color: white;">
<i class="fas fa-cloud-download-alt"></i>更新模块
</button>
<div id="updateProgress" style="
margin-top: 10px;
padding: 10px;
border-radius: 8px;
background: var(--gray-100);
font-size: 14px;
color: var(--gray-800);
display: none;
">
正在更新模块...
</div>
<button class="btn" id="startModuleBtn" style="background: linear-gradient(90deg, var(--success), #22c55e); color: white;">
<i class="fas fa-play"></i>启动模块
</button>
<button class="btn" id="stopModuleBtn" style="background: linear-gradient(90deg, var(--danger), #ef4444); color: white;">
<i class="fas fa-stop"></i>停止模块
</button>
</div>

<!-- 状态提示 -->
<div id="statusMessage" style="margin-top: 20px;"></div>
<!-- 调试信息 -->
<div id="debugInfo" style="margin-top: 20px; font-size: 12px; color: var(--gray-600); display: none;">
<pre id="debugContent"></pre>
</div>
</div>
</div>
<!-- 运行日志 -->
<div class="section">
<h2 class="section-title"><i class="fas fa-file-alt"></i>运行日志</h2>
<div style="
background: #1f2937;
color: #4ade80;
font-family: monospace;
font-size: 6px;            <!-- 6px，极限再小就别看了 -->
padding: 2px;              <!-- 几乎无内边距 -->
border-radius: 2px;
max-height: 300px;
overflow-y: auto;
overflow-x: auto;
white-space: nowrap;
line-height: 1.0;
letter-spacing: 0.05px;    <!-- 几乎无字间距 -->
tab-size: 4;
scrollbar-width: thin;
scrollbar-color: #4b5563 #1f2937;
" id="logWindow">加载中...</div>
</div>

<script>

// 配置文件路径
let progressInterval = null;
const PROGRESS_FILE = '/data/adb/modules/wangke/update_progress.txt';
const MODULE_DIR = '/data/adb/亡客';
const MODULE_DIR1 = '/data/adb/modules/wangke';
const CONFIG_PATH = MODULE_DIR + '/pz.ini';
const WANGKE_FILE = MODULE_DIR + '/wangke';

// 配置状态
const config = {
noRecoil: false,
aimAssist: false,
noAimAssist: false,
fullBody: false,
distance: 1.0,
ranges: {
head: { enabled: false, value: '' },
chest: { enabled: false, value: '' },
abdomen: { enabled: false, value: '' },
leg: { enabled: false, value: '' }
}
};

// 默认关闭值
const DEFAULT_VALUES = {
head: '12.585',
chest: '21',
abdomen: '18',
leg: '15'
};

// DOM元素
const elements = {
noRecoilSwitch: document.getElementById('noRecoilSwitch'),
aimAssistSwitch: document.getElementById('aimAssistSwitch'),
noAimAssistSwitch: document.getElementById('noAimAssistSwitch'),
fullBodySwitch: document.getElementById('fullBodySwitch'),
distanceSlider: document.getElementById('distanceSlider'),
distanceValue: document.getElementById('distanceValue'),
// 开关元素
headSwitch: document.getElementById('headSwitch'),
chestSwitch: document.getElementById('chestSwitch'),
abdomenSwitch: document.getElementById('abdomenSwitch'),
legSwitch: document.getElementById('legSwitch'),
// 输入框元素
headRange: document.getElementById('headRange'),
chestRange: document.getElementById('chestRange'),
abdomenRange: document.getElementById('abdomenRange'),
legRange: document.getElementById('legRange'),
statusMessage: document.getElementById('statusMessage'),
saveBtn: document.getElementById('saveBtn'),
resetBtn: document.getElementById('resetBtn'),
reloadBtn: document.getElementById('reloadBtn'),
debugInfo: document.getElementById('debugInfo'),
debugContent: document.getElementById('debugContent')
};

function startProgressMonitor() {
const progressEl = document.getElementById('updateProgress');
progressEl.style.display = 'block';

progressInterval = setInterval(() => {
ksu.exec(
`cat ${PROGRESS_FILE} 2>/dev/null`,
'{}',
function (errno, stdout) {
if (stdout) {
progressEl.textContent = stdout.trim();
}
}
);
}, 500);
}

function stopProgressMonitor() {
clearInterval(progressInterval);
const progressEl = document.getElementById('updateProgress');
setTimeout(() => {
progressEl.style.display = 'none';
}, 2000);
}

// 显示消息
function showMessage(message, type = 'success') {
const messageEl = elements.statusMessage;
messageEl.textContent = message;
messageEl.style.cssText = `
padding: 12px 20px;
border-radius: 8px;
margin-top: 20px;
font-weight: 500;
animation: fadeIn 0.3s ease;
background: ${type === 'success' ? 'rgba(34, 197, 94, 0.1)' : 
type === 'warning' ? 'rgba(251, 191, 36, 0.1)' : 
'rgba(239, 68, 68, 0.1)'};
color: ${type === 'success' ? '#16a34a' : 
type === 'warning' ? '#d97706' : 
'#dc2626'};
border: 1px solid ${type === 'success' ? 'rgba(34, 197, 94, 0.2)' : 
type === 'warning' ? 'rgba(251, 191, 36, 0.2)' : 
'rgba(239, 68, 68, 0.2)'};
`;

setTimeout(() => {
messageEl.style.opacity = '0';
messageEl.style.transition = 'opacity 0.5s ease';
setTimeout(() => {
messageEl.textContent = '';
messageEl.style.cssText = '';
}, 500);
}, 3000);
}

// 更新状态显示
function updateStatus() {
document.getElementById('noRecoilStatus').textContent = config.noRecoil ? '已开启' : '已关闭';
document.getElementById('noRecoilStatus').className = `status-indicator ${config.noRecoil ? 'status-on' : 'status-off'}`;

document.getElementById('aimAssistStatus').textContent = config.aimAssist ? '已开启' : '已关闭';
document.getElementById('aimAssistStatus').className = `status-indicator ${config.aimAssist ? 'status-on' : 'status-off'}`;

document.getElementById('noAimAssistStatus').textContent = config.noAimAssist ? '已开启' : '已关闭';
document.getElementById('noAimAssistStatus').className = `status-indicator ${config.noAimAssist ? 'status-on' : 'status-off'}`;

document.getElementById('fullBodyStatus').textContent = config.fullBody ? '已开启' : '已关闭';
document.getElementById('fullBodyStatus').className = `status-indicator ${config.fullBody ? 'status-on' : 'status-off'}`;

// 更新卡片激活状态
document.getElementById('noRecoilCard').classList.toggle('active', config.noRecoil);
document.getElementById('aimAssistCard').classList.toggle('active', config.aimAssist);
document.getElementById('noAimAssistCard').classList.toggle('active', config.noAimAssist);
document.getElementById('fullBodyCard').classList.toggle('active', config.fullBody);
}

// 互斥逻辑
function updateSwitchStates() {
if (config.aimAssist && config.noAimAssist) {
config.noAimAssist = false;
elements.noAimAssistSwitch.checked = false;
}

if (config.aimAssist) {
elements.noAimAssistSwitch.disabled = true;
document.getElementById('noAimAssistCard').style.opacity = '0.6';
} else if (config.noAimAssist) {
elements.aimAssistSwitch.disabled = true;
document.getElementById('aimAssistCard').style.opacity = '0.6';
} else {
elements.noAimAssistSwitch.disabled = false;
elements.aimAssistSwitch.disabled = false;
document.getElementById('noAimAssistCard').style.opacity = '1';
document.getElementById('aimAssistCard').style.opacity = '1';
}

updateStatus();
}

// 解析配置内容
function parseConfigContent(content) {
const configObj = {};
const lines = content.split('\n');

lines.forEach((line, index) => {
const [key, value] = line.split('=');
if (key && value !== undefined) {
configObj[key.trim()] = value.trim();
}
});

return configObj;
}
// 将 Unix 时间戳转换为本地时间字符串
function formatTimestamp(ts) {
const date = new Date(ts * 1000); // 转成毫秒
if (isNaN(date.getTime())) return '无效时间';
return date.toLocaleString('zh-CN', {
year: 'numeric',
month: '2-digit',
day: '2-digit',
hour: '2-digit',
minute: '2-digit',
second: '2-digit',
hour12: false
});
}

// 从配置文件应用到UI
function applyConfigToUI(configData) {
console.log('应用配置到UI:', configData);

// 1. 全枪无后
if (configData.allGunNoRecoil) {
config.noRecoil = configData.allGunNoRecoil === '1';
elements.noRecoilSwitch.checked = config.noRecoil;
}

// 2. 有准心聚点
if (configData.hasCrosshair) {
config.aimAssist = configData.hasCrosshair === '1';
elements.aimAssistSwitch.checked = config.aimAssist;
}

// 3. 无准心聚点
if (configData.noCrosshair) {
config.noAimAssist = configData.noCrosshair === '1';
elements.noAimAssistSwitch.checked = config.noAimAssist;
}

// 4. 全身范围
if (configData.fullBodyRange) {
config.fullBody = configData.fullBodyRange === '1';
elements.fullBodySwitch.checked = config.fullBody;
}

// 5. 身位
if (configData.bodySize) {
const distance = parseFloat(configData.bodySize);
if (!isNaN(distance) && distance >= 0.5 && distance <= 2.5) {
config.distance = distance;
elements.distanceSlider.value = distance;
elements.distanceValue.textContent = distance.toFixed(1);
}
}

// 6. 头部范围
if (configData.headRange) {
const [enabled, value] = configData.headRange.split(':');
config.ranges.head.enabled = enabled === '1';
elements.headSwitch.checked = config.ranges.head.enabled;
elements.headRange.disabled = !config.ranges.head.enabled;
elements.headRange.value = config.ranges.head.enabled ? value : '';
config.ranges.head.value = config.ranges.head.enabled ? value : '';
}

// 7. 胸部范围
if (configData.chestRange) {
const [enabled, value] = configData.chestRange.split(':');
config.ranges.chest.enabled = enabled === '1';
elements.chestSwitch.checked = config.ranges.chest.enabled;
elements.chestRange.disabled = !config.ranges.chest.enabled;
elements.chestRange.value = config.ranges.chest.enabled ? value : '';
config.ranges.chest.value = config.ranges.chest.enabled ? value : '';
}

// 8. 腹部范围
if (configData.abdomenRange) {
const [enabled, value] = configData.abdomenRange.split(':');
config.ranges.abdomen.enabled = enabled === '1';
elements.abdomenSwitch.checked = config.ranges.abdomen.enabled;
elements.abdomenRange.disabled = !config.ranges.abdomen.enabled;
elements.abdomenRange.value = config.ranges.abdomen.enabled ? value : '';
config.ranges.abdomen.value = config.ranges.abdomen.enabled ? value : '';
}

// 9. 腿部范围
if (configData.legRange) {
const [enabled, value] = configData.legRange.split(':');
config.ranges.leg.enabled = enabled === '1';
elements.legSwitch.checked = config.ranges.leg.enabled;
elements.legRange.disabled = !config.ranges.leg.enabled;
elements.legRange.value = config.ranges.leg.enabled ? value : '';
config.ranges.leg.value = config.ranges.leg.enabled ? value : '';
}

updateSwitchStates();
}

// 生成配置内容
function generateConfigContent() {
const lines = [];

lines.push(`allGunNoRecoil=${config.noRecoil ? '1' : '0'}`);

if (config.aimAssist && config.noAimAssist) {
lines.push('hasCrosshair=0');
} else {
lines.push(`hasCrosshair=${config.aimAssist ? '1' : '0'}`);
}

if (config.aimAssist && config.noAimAssist) {
lines.push('noCrosshair=0');
} else {
lines.push(`noCrosshair=${config.noAimAssist ? '1' : '0'}`);
}

lines.push(`fullBodyRange=${config.fullBody ? '1' : '0'}`);
lines.push(`bodySize=${config.distance.toFixed(1)}身位`);

// 头部范围
if (config.ranges.head.enabled && config.ranges.head.value) {
lines.push(`headRange=1:${config.ranges.head.value}`);
} else {
lines.push(`headRange=0:${DEFAULT_VALUES.head}`);
}

// 胸部范围
if (config.ranges.chest.enabled && config.ranges.chest.value) {
lines.push(`chestRange=1:${config.ranges.chest.value}`);
} else {
lines.push(`chestRange=0:${DEFAULT_VALUES.chest}`);
}

// 腹部范围
if (config.ranges.abdomen.enabled && config.ranges.abdomen.value) {
lines.push(`abdomenRange=1:${config.ranges.abdomen.value}`);
} else {
lines.push(`abdomenRange=0:${DEFAULT_VALUES.abdomen}`);
}

// 腿部范围
if (config.ranges.leg.enabled && config.ranges.leg.value) {
lines.push(`legRange=1:${config.ranges.leg.value}`);
} else {
lines.push(`legRange=0:${DEFAULT_VALUES.leg}`);
}

return lines.join('\n');
}


// 检查是否至少有一个范围开关开启
function isAnyRangeEnabled() {
return config.ranges.head.enabled || 
config.ranges.chest.enabled || 
config.ranges.abdomen.enabled || 
config.ranges.leg.enabled;
}

// 创建或删除wangke文件
function manageWangkeFile() {
return new Promise((resolve, reject) => {
if (isAnyRangeEnabled()) {
// 至少有一个范围开启，创建文件
const callbackId = 'create_' + Date.now();
window[callbackId] = function(errno) {
delete window[callbackId];
if (errno === 0) {
console.log('wangke文件已创建');
resolve(true);
} else {
console.log('创建wangke文件失败');
resolve(false);
}
};
ksu.exec('touch ' + WANGKE_FILE, '{}', callbackId);
} else {
// 所有范围都关闭，删除文件
const callbackId = 'delete_' + Date.now();
window[callbackId] = function(errno) {
delete window[callbackId];
if (errno === 0) {
console.log('wangke文件已删除');
resolve(true);
} else {
console.log('删除wangke文件失败（可能文件不存在）');
resolve(true); // 文件不存在也算成功
}
};
ksu.exec('rm -f ' + WANGKE_FILE, '{}', callbackId);
}
});
}

// 从文件读取配置
function loadConfigFromFile() {
return new Promise((resolve, reject) => {
const callbackId = 'load_' + Date.now();
window[callbackId] = function(errno, stdout) {
delete window[callbackId];
if (errno === 0 && stdout) {
try {
const configData = parseConfigContent(stdout);
applyConfigToUI(configData);
showMessage('配置加载成功', 'success');

// 显示调试信息
elements.debugContent.textContent = '当前配置:\n' + stdout;
elements.debugInfo.style.display = 'block';
resolve(true);
} catch (error) {
showMessage('解析配置文件失败: ' + error.message, 'error');
resolve(false);
}
} else {
showMessage('配置文件不存在或读取失败', 'warning');
resolve(false);
}
};
ksu.exec('cat ' + CONFIG_PATH + ' 2>/dev/null', '{}', callbackId);
});
}

// 保存配置到文件
function saveConfigToFile() {
return new Promise((resolve, reject) => {
const configContent = generateConfigContent();
const callbackId1 = 'mkdir_' + Date.now();
window[callbackId1] = function(errno) {
if (errno !== 0) {
showMessage('目录创建失败', 'error');
resolve(false);
return;
}

// 先写入配置文件
const writeCmd = 'cat > ' + CONFIG_PATH + ' << \'EOF\'\n' + configContent + '\nEOF';
const callbackId2 = 'write_' + Date.now();
window[callbackId2] = function(errno2) {
delete window[callbackId2];
if (errno2 === 0) {
// 然后管理wangke文件
manageWangkeFile().then(success => {
showMessage('配置保存成功' + (success ? '' : '，但wangke文件操作失败'), 
success ? 'success' : 'warning');

// 显示调试信息
elements.debugContent.textContent = '保存的配置:\n' + configContent + 
'\n\n状态: ' + (isAnyRangeEnabled() ? '启动循环注入' : '停止循环注入');
elements.debugInfo.style.display = 'block';
resolve(true);
});
} else {
showMessage('写入配置文件失败', 'error');
resolve(false);
}
};
ksu.exec(writeCmd, '{}', callbackId2);
};
ksu.exec('mkdir -p ' + MODULE_DIR, '{}', callbackId1);
});
}

// 范围开关切换处理
function handleRangeSwitch(switchElement, inputElement, part) {
const enabled = switchElement.checked;
config.ranges[part].enabled = enabled;
inputElement.disabled = !enabled;
if (!enabled) {
inputElement.value = '';
config.ranges[part].value = '';
}
if (enabled) {
inputElement.focus();
}
}

// 事件监听
function initEventListeners() {
// 全枪无后开关
elements.noRecoilSwitch.addEventListener('change', function() {
config.noRecoil = this.checked;
updateStatus();
});

// 有准心聚点开关
elements.aimAssistSwitch.addEventListener('change', function() {
config.aimAssist = this.checked;
updateSwitchStates();
});

// 无准心聚点开关
elements.noAimAssistSwitch.addEventListener('change', function() {
config.noAimAssist = this.checked;
updateSwitchStates();
});

// 全身范围开关
elements.fullBodySwitch.addEventListener('change', function() {
config.fullBody = this.checked;
updateStatus();
});

// 身位滑块
elements.distanceSlider.addEventListener('input', function() {
const value = parseFloat(this.value);
config.distance = value;
elements.distanceValue.textContent = value.toFixed(1);
});

// 头部范围开关
elements.headSwitch.addEventListener('change', function() {
handleRangeSwitch(this, elements.headRange, 'head');
});

// 胸部范围开关
elements.chestSwitch.addEventListener('change', function() {
handleRangeSwitch(this, elements.chestRange, 'chest');
});

// 腹部范围开关
elements.abdomenSwitch.addEventListener('change', function() {
handleRangeSwitch(this, elements.abdomenRange, 'abdomen');
});

// 腿部范围开关
elements.legSwitch.addEventListener('change', function() {
handleRangeSwitch(this, elements.legRange, 'leg');
});

// 范围输入框
[elements.headRange, elements.chestRange, elements.abdomenRange, elements.legRange].forEach(input => {
input.addEventListener('change', function() {
const part = this.id.replace('Range', '');
if (config.ranges[part].enabled) {
config.ranges[part].value = this.value;
}
});
});

// 保存按钮
elements.saveBtn.addEventListener('click', async function() {
const originalText = this.innerHTML;
this.innerHTML = '<span class="loading"></span> 保存中...';
this.disabled = true;

const success = await saveConfigToFile();

this.innerHTML = originalText;
this.disabled = false;
});

// 重置按钮
elements.resetBtn.addEventListener('click', async function() {
if (!confirm('确定要重置所有配置为默认值吗？此操作不可撤销。')) {
return;
}

const originalText = this.innerHTML;
this.innerHTML = '<span class="loading"></span> 重置中...';
this.disabled = true;

// 重置所有配置
config.noRecoil = false;
config.aimAssist = false;
config.noAimAssist = false;
config.fullBody = false;
config.distance = 1.0;
config.ranges.head = { enabled: false, value: '' };
config.ranges.chest = { enabled: false, value: '' };
config.ranges.abdomen = { enabled: false, value: '' };
config.ranges.leg = { enabled: false, value: '' };

// 更新UI
elements.noRecoilSwitch.checked = false;
elements.aimAssistSwitch.checked = false;
elements.noAimAssistSwitch.checked = false;
elements.fullBodySwitch.checked = false;
elements.distanceSlider.value = 1.0;
elements.distanceValue.textContent = '1.0';

elements.headSwitch.checked = false;
elements.chestSwitch.checked = false;
elements.abdomenSwitch.checked = false;
elements.legSwitch.checked = false;

elements.headRange.disabled = true;
elements.chestRange.disabled = true;
elements.abdomenRange.disabled = true;
elements.legRange.disabled = true;

elements.headRange.value = '';
elements.chestRange.value = '';
elements.abdomenRange.value = '';
elements.legRange.value = '';

updateStatus();
updateSwitchStates();

// 保存到文件
await saveConfigToFile();

this.innerHTML = originalText;
this.disabled = false;
});

// 重新加载按钮
elements.reloadBtn.addEventListener('click', async function() {
const originalText = this.innerHTML;
this.innerHTML = '<span class="loading"></span> 加载中...';
this.disabled = true;

await loadConfigFromFile();

this.innerHTML = originalText;
this.disabled = false;
});
function execShell(scriptName, btn, loadingText, successMsg) {
const originalText = btn.innerHTML;
btn.innerHTML = `<span class="loading"></span> ${loadingText}`;
btn.disabled = true;

const callbackId = 'shell_' + Date.now();
window[callbackId] = function (errno) {
delete window[callbackId];
btn.innerHTML = originalText;
btn.disabled = false;

if (errno === 0) {
showMessage(successMsg, 'success');
} else {
showMessage(`${scriptName} 执行失败`, 'error');
}
};

ksu.exec(`sh ${MODULE_DIR1}/${scriptName}`, '{}', callbackId);
}

// 更新模块 gx.sh
document.getElementById('updateModuleBtn').addEventListener('click', function () {
const btn = this;
const originalText = btn.innerHTML;

btn.innerHTML = '<span class="loading"></span> 更新中...';
btn.disabled = true;

startProgressMonitor();

const updateCallback = 'update_' + Date.now();
window[updateCallback] = function (errno) {
stopProgressMonitor();
btn.innerHTML = originalText;
btn.disabled = false;

if (errno !== 0) {
showMessage('模块更新失败', 'error');

// ✅ 使用 ls 判断文件是否存在（KSU WebUI 最稳方式）
const checkPidCallback = 'checkpid_' + Date.now();
window[checkPidCallback] = function (_, stdout) {
delete window[checkPidCallback];

if (stdout && stdout.includes('gx.pid.txt')) {
showMessage('模块更新成功', 'success');

// 清理 pid 文件
ksu.exec(
'rm -f /data/adb/modules/wangke/gx.pid.txt',

function () {}
);

setTimeout(function() {
location.reload();
}, 1000);  // 延迟 1 秒，让用户看到成功提示
} else {

}
};

ksu.exec(
'ls /data/adb/modules/wangke/gx.pid.txt 2>/dev/null',
'{}',

);
};

ksu.exec(
'sh /data/adb/modules/wangke/gx1.sh',
'{}',
updateCallback
);
});

// 启动模块 start.sh
document.getElementById('startModuleBtn').addEventListener('click', function () {
execShell('start.sh', this, '启动中...', '模块已启动');
});


// 停止模块 stop.sh
document.getElementById('stopModuleBtn').addEventListener('click', function () {

});

}
// 在 ansiToHtml 中，把 \n 转成 <br>，这样长行不会丢失
function ansiToHtml(text) {
return text
.replace(/\033\[32m/g, '<span style="color: #4ade80;">')   // 绿色
.replace(/\033\[36m/g, '<span style="color: #22c55e;">')   // 亮绿
.replace(/\033\[0m/g, '</span>')                           // 重置
.replace(/\033\[31m/g, '<span style="color: #f87171;">')   // 红色
.replace(/\033\[33m/g, '<span style="color: #fbbf24;">')   // 黄色
.replace(/\033\[34m/g, '<span style="color: #60a5fa;">')   // 蓝色
.replace(/\033\[35m/g, '<span style="color: #c084fc;">')   // 紫色
.replace(/\033\[90m/g, '<span style="color: #9ca3af;">')   // 灰色
.replace(/\033\[96m/g, '<span style="color: #06b6d4;">')   // 青色
.replace(/\033\[97m/g, '<span style="color: #f3f4f6;">')   // 白色
.replace(/\033\[2m/g, '<span style="opacity: 0.7;">')      // 暗淡
.replace(/\033\[22m/g, '</span>')                          // 重置暗淡
.replace(/\033\[1m/g, '<span style="font-weight: bold;">') // 加粗
.replace(/\033\[22m/g, '</span>')                          // 重置加粗
.replace(/\033\[3m/g, '<span style="font-style: italic;">') // 斜体
.replace(/\033\[23m/g, '</span>')                          // 重置斜体
.replace(/\033\[4m/g, '<span style="text-decoration: underline;">') // 下划线
.replace(/\033\[24m/g, '</span>')                         // 重置下划线
.replace(/\n/g, '<br>')                                    // 换行转 <br>
.replace(/ /g, '&nbsp;');                                  // 空格转 HTML
}


// 日志文件路径
const LOG_PATH = '/data/local/tmp/wk.log';
// 从文件读取日志
function loadLogFromFile() {
return new Promise((resolve, reject) => {
const callbackId = 'load_log_' + Date.now();
window[callbackId] = function(errno, stdout) {
delete window[callbackId];
const logWindow = document.getElementById('logWindow');
if (errno === 0 && stdout) {
logWindow.innerHTML = ansiToHtml(stdout); // 用 innerHTML 显示带颜色的日志
} else {
logWindow.innerHTML = '暂无日志或读取失败';
}
resolve(true);
};
ksu.exec('cat ' + LOG_PATH + ' 2>/dev/null', '{}', callbackId);
});
}

setInterval(loadLogFromFile, 1000);
}
